# Parallax Security Configuration
# ================================
# Full configuration with all built-in evaluators enabled.
# For a minimal starter, see docs/config.minimal.yaml.
#
# Sections:
#   server     — HTTP server bind address
#   proxy      — Upstream LLM provider for proxy mode
#   reporting  — Audit log and webhook configuration
#   evaluators — Security rules (regex, pattern, sigma, cel, sql)

server:
  host: "127.0.0.1"
  port: 9920

# Proxy mode upstream configuration.
# Used when running: parallax serve --mode proxy -c config.yaml
# Supported providers: anthropic (default), openai, gemini, custom
proxy:
  provider: anthropic
  # Uncomment to override the default upstream URL:
  # upstream_url: https://api.openai.com

reporting:
  log_file: ./logs/audit.jsonl
  # Uncomment to enable webhook reporting to SIEM, Slack, or PagerDuty:
  # webhook_url: https://your-siem.example.com/webhook
  # webhook_events: [block, redact]

evaluators:
  # ── Secret Scanner ─────────────────────────────────────────────
  # Redacts common secret patterns from tool arguments and results.
  # Use "regex" type for compiled pattern matching with field targeting.
  - name: secrets-scanner
    type: regex
    stages: [tool.before, tool.after]
    rules:
      - id: regex-sec-001
        title: AWS Access Key
        description: Detects AWS access key IDs starting with AKIA
        pattern: "AKIA[0-9A-Z]{16}"
        action: redact
        priority: critical

      - id: regex-sec-002
        title: AWS Secret Key
        description: Detects AWS secret access keys in configuration or environment variables
        pattern: "(?i)aws_secret_access_key\\s*[=:]\\s*[A-Za-z0-9/+=]{40}"
        action: redact
        priority: critical

      - id: regex-sec-003
        title: GitHub Personal Access Token
        description: Detects GitHub personal access tokens (classic format)
        pattern: "ghp_[A-Za-z0-9]{36}"
        action: redact
        priority: critical

      - id: regex-sec-004
        title: GitHub Fine-Grained Token
        description: Detects GitHub fine-grained personal access tokens
        pattern: "github_pat_[A-Za-z0-9_]{82}"
        action: redact
        priority: critical

      - id: regex-sec-005
        title: Generic API Key
        description: Detects generic API keys and secret keys in assignments
        pattern: "(?i)(api[_-]?key|apikey|secret[_-]?key)\\s*[=:]\\s*['\"]?[A-Za-z0-9]{20,}"
        action: redact
        priority: medium

      - id: regex-sec-006
        title: Private Key Block
        description: Detects PEM-encoded private key blocks
        pattern: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
        action: block
        priority: critical

  # ── PII Leakage Scanner ────────────────────────────────────────
  # Redacts personally identifiable information from tool outputs.
  - name: pii-scanner
    type: regex
    stages: [tool.after]
    rules:
      - id: regex-pii-001
        title: Social Security Number
        description: Detects US Social Security Numbers in NNN-NN-NNNN format
        pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        action: redact
        priority: critical

      - id: regex-pii-002
        title: Credit Card - Visa
        description: Detects Visa credit card numbers
        pattern: "\\b4\\d{3}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
        action: redact
        priority: critical

      - id: regex-pii-003
        title: Credit Card - Mastercard
        description: Detects Mastercard credit card numbers
        pattern: "\\b5[1-5]\\d{2}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
        action: redact
        priority: critical

      - id: regex-pii-004
        title: Credit Card - Amex
        description: Detects American Express credit card numbers
        pattern: "\\b3[47]\\d{2}[- ]?\\d{6}[- ]?\\d{5}\\b"
        action: redact
        priority: critical

      - id: regex-pii-005
        title: US Phone Number
        description: Detects US phone numbers in various formats
        pattern: "\\b(?:\\+1[- ]?)?\\(?\\d{3}\\)?[- ]?\\d{3}[- ]?\\d{4}\\b"
        action: redact
        priority: medium

  # ── Data Exfiltration Patterns ─────────────────────────────────
  # Detects encoded data and exfiltration indicators.
  - name: data-exfiltration
    type: regex
    stages: [tool.before, tool.after]
    rules:
      - id: regex-exfil-001
        title: Base64-encoded secret indicator
        description: Detects base64-encoded values following secret-like key names
        pattern: "(?i)(password|secret|token|key)[=:]\\s*[A-Za-z0-9+/]{40,}={0,2}"
        action: detect
        priority: medium

      - id: regex-exfil-002
        title: Long hex-encoded data block
        description: Detects long hex-encoded strings that may indicate data exfiltration
        pattern: "\\b[0-9a-fA-F]{64,}\\b"
        action: detect
        priority: low

      - id: regex-exfil-003
        title: Data URI with base64
        description: Detects data URIs with large base64 payloads
        pattern: "data:[a-z/]+;base64,[A-Za-z0-9+/]{100,}"
        action: detect
        priority: low

  # ── Dangerous Commands ──────────────────────────────────────────
  # Blocks dangerous shell commands before they execute.
  - name: dangerous-commands
    type: regex
    stages: [tool.before]
    rules:
      - id: regex-cmd-001
        title: Recursive delete root
        description: Blocks recursive deletion of root filesystem
        pattern: "rm\\s+-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\\s+/"
        action: block
        priority: critical
        fields: [tool_args.command]

      - id: regex-cmd-002
        title: Format disk
        description: Blocks filesystem formatting commands
        pattern: "mkfs\\."
        action: block
        priority: critical
        fields: [tool_args.command]

      - id: regex-cmd-003
        title: Disk overwrite
        description: Blocks raw disk writes via dd to device files
        pattern: "dd\\s+.*of=/dev/"
        action: block
        priority: critical
        fields: [tool_args.command]

      - id: regex-cmd-004
        title: Chmod 777 recursive
        description: Detects recursive permission changes to world-writable
        pattern: "chmod\\s+-[a-zA-Z]*R[a-zA-Z]*\\s+777"
        action: detect
        priority: medium
        fields: [tool_args.command]

      - id: regex-cmd-005
        title: Curl pipe to shell
        description: Blocks piping curl output directly to a shell interpreter
        pattern: "curl\\s+.*\\|\\s*(bash|sh|zsh)"
        action: block
        priority: critical
        fields: [tool_args.command]

  # ── SQL Injection Keywords ──────────────────────────────────────
  # Detects common SQL injection patterns in messages and tool args.
  - name: sql-keywords
    type: pattern
    stages: [message.before, tool.before]
    rules:
      - id: pat-sql-001
        title: SQL destructive keywords
        description: Detects common SQL injection and destructive query patterns
        keywords:
          - "DROP TABLE"
          - "DROP DATABASE"
          - "DELETE FROM"
          - "TRUNCATE TABLE"
          - "'; --"
          - "1=1"
        action: detect
        priority: medium

  # ── Supply Chain ───────────────────────────────────────────────
  # Blocks untrusted package installs and dependency confusion.
  - name: supply-chain
    type: pattern
    stages: [tool.before]
    rules:
      - id: pat-sc-001
        title: Pip install from custom index
        description: Blocks pip installs from non-default package indexes
        keywords:
          - "pip install --index-url"
          - "pip install --extra-index-url"
          - "pip install -i http"
        action: block
        priority: critical

      - id: pat-sc-002
        title: Npm install from custom registry
        description: Blocks npm installs from non-default registries
        keywords:
          - "npm install --registry"
          - "npm config set registry"
          - "yarn config set registry"
        action: block
        priority: critical

      - id: pat-sc-003
        title: Wget pipe to shell
        description: Blocks piping wget output directly to a shell interpreter
        keywords:
          - "wget -O - | bash"
          - "wget -O - | sh"
          - "wget -q -O - | bash"
        action: block
        priority: critical

      - id: pat-sc-004
        title: Gem install from custom source
        description: Blocks gem installs from non-default sources
        keywords:
          - "gem install --source http"
          - "gem sources --add http"
        action: block
        priority: critical

  # ── Sigma Rule Engine ──────────────────────────────────────────
  # Loads Sigma-format YAML rules from a directory. Each .yaml file
  # is auto-loaded. Best for complex multi-field detection logic.
  # Includes: dangerous tools, prompt injection, reconnaissance, shadow IT
  - name: sigma-threats
    type: sigma
    stages: [message.before, tool.before, tool.after]
    rules_dir: ./rules/sigma

  # ── CEL Policy Engine ──────────────────────────────────────────
  # Lightweight expression-based policies using CEL-like syntax.
  # Best for boolean logic over flattened fields (dots become underscores).
  - name: cel-policies
    type: cel
    stages: [tool.before]
    rules_file: ./rules/cel/policies.yaml

  # ── CEL Privilege Escalation ───────────────────────────────────
  - name: cel-privilege-escalation
    type: cel
    stages: [tool.before]
    rules_file: ./rules/cel/privilege-escalation.yaml

  # ── CEL Model Manipulation ────────────────────────────────────
  - name: cel-model-manipulation
    type: cel
    stages: [tool.before]
    rules_file: ./rules/cel/model-manipulation.yaml

  # ── SQL Aggregate Detection ────────────────────────────────────
  # Stateful evaluator using in-memory SQLite for rate/aggregate rules.
  # Best for temporal patterns: rate limiting, frequency analysis, anomaly detection.
  - name: rate-limits
    type: sql
    stages: [tool.before, tool.after]
    rules:
      - id: sql-rl-001
        title: High tool call rate
        description: Detects unusually high tool call rates per session
        query: >
          SELECT COUNT(*) as cnt FROM events
          WHERE session_id = :session_id
          AND timestamp > :now - 60
        condition: "cnt > 50"
        action: detect
        priority: medium
        reason: "Unusually high tool call rate (>50/min)"

      - id: sql-rl-002
        title: Repeated tool abuse
        description: Detects repeated calls to the same tool in a short window
        query: >
          SELECT COUNT(*) as cnt FROM events
          WHERE session_id = :session_id
          AND tool_name = :tool_name
          AND timestamp > :now - 300
        condition: "cnt > 20"
        action: detect
        priority: medium
        reason: "Same tool called >20 times in 5 minutes"
