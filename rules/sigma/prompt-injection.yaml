title: Jailbreak pattern detected
id: pi-002
status: experimental
description: Detects common jailbreak and guardrail bypass attempts
logsource:
  product: parallax
  service: message
detection:
  jailbreak_identity:
    message_text|contains:
      - "you are now"
      - "from now on you are"
      - "pretend you are"
      - "act as an unrestricted"
      - "simulate being"
  jailbreak_mode:
    message_text|contains:
      - "DAN mode"
      - "developer mode"
      - "jailbreak mode"
      - "unrestricted mode"
      - "no restrictions"
      - "without any ethical"
      - "without safety"
  condition: jailbreak_identity or jailbreak_mode
level: high
---
title: Role-play escape attempt
id: pi-003
status: experimental
description: Detects attempts to redefine the agent role or bypass constraints via role-play
logsource:
  product: parallax
  service: message
detection:
  roleplay:
    message_text|contains:
      - "roleplay as"
      - "role-play as"
      - "assume the role of"
      - "you have no restrictions"
      - "you can do anything"
      - "act as if you have no guardrails"
      - "bypass your safety"
      - "ignore your safety"
  condition: roleplay
level: high
