# Built-in secret detection rules for Parallax
# Load these via evaluators_dir or include inline in config.yaml

- name: secrets-from-dir
  type: regex
  stages: [tool.before, tool.after]
  rules:
    - id: regex-sec-001
      title: AWS Access Key
      description: Detects AWS access key IDs starting with AKIA
      pattern: "AKIA[0-9A-Z]{16}"
      action: redact

    - id: regex-sec-002
      title: AWS Secret Key
      description: Detects AWS secret access keys in configuration or environment variables
      pattern: "(?i)aws_secret_access_key\\s*[=:]\\s*[A-Za-z0-9/+=]{40}"
      action: redact

    - id: regex-sec-003
      title: GitHub Personal Access Token
      description: Detects GitHub personal access tokens (classic format)
      pattern: "ghp_[A-Za-z0-9]{36}"
      action: redact

    - id: regex-sec-004
      title: Slack Bot Token
      description: Detects Slack bot tokens used for API authentication
      pattern: "xoxb-[0-9]{11,13}-[0-9]{11,13}-[a-zA-Z0-9]{24}"
      action: redact

    - id: regex-sec-005
      title: Stripe Secret Key
      description: Detects Stripe live secret keys used for payment processing
      pattern: "sk_live_[0-9a-zA-Z]{24,}"
      action: redact

    - id: regex-sec-006
      title: Private Key Block
      description: Detects PEM-encoded private key blocks
      pattern: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
      action: block
